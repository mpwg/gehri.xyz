name: Deploy CMS Auth

on:
  push:
    branches:
      - main
    paths:
      - "cms-auth/**"
      - ".github/workflows/deploy-cms-auth.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Wrangler
        run: npm install --global wrangler@4.71.0

      - name: Sync cms-auth Secrets
        run: |
          node -e "const fs = require('fs'); fs.writeFileSync('/tmp/cms-auth-secrets.json', JSON.stringify({ GITHUB_OAUTH_ID: process.env.GITHUB_OAUTH_ID, GITHUB_OAUTH_SECRET: process.env.GITHUB_OAUTH_SECRET }));"
          wrangler secret bulk /tmp/cms-auth-secrets.json --config cms-auth/wrangler.toml
          rm /tmp/cms-auth-secrets.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_OAUTH_ID: ${{ secrets.CMS_OAUTH_ID }}
          GITHUB_OAUTH_SECRET: ${{ secrets.CMS_OAUTH_SECRET }}

      - name: Deploy cms-auth Worker
        run: wrangler deploy --config cms-auth/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_OAUTH_ID: ${{ secrets.CMS_OAUTH_ID }}
          GITHUB_OAUTH_SECRET: ${{ secrets.CMS_OAUTH_SECRET }}
