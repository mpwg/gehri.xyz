backend:
  name: github
  repo: mpwg/gehri.xyz
  branch: main
  base_url: https://cms-auth.gehri.xyz
  auth_endpoint: /auth

site_url: https://gehri.xyz

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: site
    label: Webseite
    files:
      - label: Startseite
        name: homepage
        file: src/content/site/homepage.yml
        fields:
          - { label: Seitentitel, name: title, widget: string }
          - { label: SEO Beschreibung, name: description, widget: text }
          - { label: Brand im Header, name: brand, widget: string }
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Haupttitel, name: headline, widget: text }
              - { label: Einleitung, name: intro, widget: text }
              - label: Primaerer Button
                name: primaryCta
                widget: object
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Ziel, name: href, widget: string }
              - label: Sekundaerer Button
                name: secondaryCta
                widget: object
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Ziel, name: href, widget: string }
              - label: Hero Bild
                name: image
                widget: object
                fields:
                  - { label: Bild, name: src, widget: image }
                  - { label: Alternativtext, name: alt, widget: string }
          - label: Seitenbereiche
            name: sections
            widget: list
            summary: "{{fields.type}} | {{fields.title}}"
            types:
              - label: Textbereich
                name: text
                widget: object
                fields:
                  - { label: Typ, name: type, widget: hidden, default: text }
                  - { label: Bereichs-ID, name: id, widget: string }
                  - { label: Navigation, name: navLabel, widget: string }
                  - { label: Tag, name: tag, widget: string }
                  - { label: Titel, name: title, widget: string }
                  - label: Layout
                    name: layout
                    widget: select
                    options:
                      - { label: Eine Spalte, value: single }
                      - { label: Zwei Spalten, value: two-column }
                  - label: Abschnitte
                    name: paragraphs
                    widget: list
                    field: { label: Absatz, name: paragraph, widget: text }
              - label: Linkbereich
                name: links
                widget: object
                fields:
                  - { label: Typ, name: type, widget: hidden, default: links }
                  - { label: Bereichs-ID, name: id, widget: string }
                  - { label: Navigation, name: navLabel, widget: string }
                  - { label: Tag, name: tag, widget: string }
                  - { label: Titel, name: title, widget: string }
                  - label: Eintraege
                    name: items
                    widget: list
                    fields:
                      - { label: Label, name: label, widget: string }
                      - { label: URL, name: href, widget: string }
                      - { label: Wert, name: value, widget: string }
              - label: Projektbereich
                name: projects
                widget: object
                fields:
                  - { label: Typ, name: type, widget: hidden, default: projects }
                  - { label: Bereichs-ID, name: id, widget: string }
                  - { label: Navigation, name: navLabel, widget: string }
                  - { label: Tag, name: tag, widget: string }
                  - { label: Titel, name: title, widget: string }
                  - label: Projekte
                    name: items
                    widget: list
                    fields:
                      - { label: Name, name: name, widget: string }
                      - { label: URL, name: href, widget: string }
                      - { label: Beschreibung, name: description, widget: text }
                      - { label: Button-Label, name: ctaLabel, widget: string, default: Projekt öffnen }
              - label: Bildbereich
                name: image
                widget: object
                fields:
                  - { label: Typ, name: type, widget: hidden, default: image }
                  - { label: Bereichs-ID, name: id, widget: string }
                  - { label: Navigation, name: navLabel, widget: string }
                  - { label: Tag, name: tag, widget: string }
                  - { label: Titel, name: title, widget: string }
                  - { label: Bild, name: src, widget: image }
                  - { label: Alternativtext, name: alt, widget: string }
                  - { label: Bildunterschrift, name: caption, widget: string, required: false }
