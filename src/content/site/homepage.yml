sections:
  - type: text
    id: ueber-mich
    navLabel: Über mich
    tag: Über mich
    title: Technik ist für mich dann gut, wenn sie konkret hilft.
    layout: two-column
    paragraphs:
      - Ich arbeite an digitalen Produkten, Software-Ideen und technischen
        Systemen, die im Alltag tatsaechlich verwendbar sein sollen. Mich
        interessieren weniger Schlagworte als saubere Entscheidungen,
        nachvollziehbare Architektur und Ergebnisse, die dauerhaft tragfaehig
        sind.
      - Inhaltlich bewege ich mich oft zwischen Produktdenken, Automatisierung
        und technischer Umsetzung. Dabei geht es mir um Reduktion von
        Komplexitaet, ohne Relevantes zu verlieren.
